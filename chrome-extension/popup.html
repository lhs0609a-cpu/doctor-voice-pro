<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>닥터보이스 프로</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #f8fafc; color: #0f172a;
    }
    .header {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff; padding: 16px; display: flex; align-items: center; gap: 10px;
    }
    .header .logo { font-size: 22px; }
    .header h1 { font-size: 16px; }
    .header .ver { font-size: 11px; opacity: .85; margin-top: 2px; }
    .content { padding: 14px; }

    /* 신호등 요약 */
    .beacon {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border-radius: 14px; padding: 14px 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06); margin-bottom: 12px;
    }
    .light { position: relative; width: 16px; height: 16px; border-radius: 50%; flex: none; }
    .light::after {
      content: ''; position: absolute; inset: -5px; border-radius: 50%;
      opacity: .5; animation: pulse 1.6s ease-out infinite;
    }
    .light.green { background: #10b981; } .light.green::after { box-shadow: 0 0 0 2px #10b981; }
    .light.amber { background: #f59e0b; } .light.amber::after { box-shadow: 0 0 0 2px #f59e0b; }
    .light.red   { background: #ef4444; animation: none; } .light.red::after { display: none; }
    @keyframes pulse { 0% { transform: scale(.9); opacity: .6 } 100% { transform: scale(1.8); opacity: 0 } }
    .beacon .b-title { font-size: 15px; font-weight: 700; }
    .beacon .b-desc { font-size: 12px; color: #64748b; margin-top: 2px; }

    /* 체크리스트 */
    .checks { background: #fff; border-radius: 14px; padding: 6px 4px; margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    .row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; }
    .row + .row { border-top: 1px solid #f1f5f9; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .dot.ok { background: #10b981; } .dot.warn { background: #f59e0b; } .dot.off { background: #cbd5e1; }
    .row .label { flex: 1; }
    .row .val { font-size: 12px; color: #64748b; font-weight: 600; }

    /* 업데이트 카드 */
    .update { display: none; background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 12px; }
    .update.show { display: block; }
    .update .u-title { font-size: 13px; font-weight: 700; color: #92400e; margin-bottom: 4px; }
    .update .u-notes { font-size: 12px; color: #b45309; line-height: 1.5; margin-bottom: 10px; }

    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 6px; text-decoration: none; margin-bottom: 8px; }
    .btn-amber { background: #f59e0b; color: #fff; }
    .btn-amber:hover { background: #d97706; }
    .btn-primary { background: linear-gradient(135deg,#10b981,#059669); color: #fff; }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-ghost { background: #f1f5f9; color: #334155; font-size: 13px; padding: 10px; }
    .btn-ghost:hover { background: #e2e8f0; }
    .hint { font-size: 11px; color: #94a3b8; line-height: 1.5; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🩺</span>
    <div>
      <h1>닥터보이스 프로</h1>
      <div class="ver">네이버 블로그 자동 발행 · <span id="verText">v-</span></div>
    </div>
  </div>

  <div class="content">
    <!-- 신호등 요약 -->
    <div class="beacon">
      <span class="light red" id="beaconLight"></span>
      <div>
        <div class="b-title" id="beaconTitle">상태 확인 중…</div>
        <div class="b-desc" id="beaconDesc">잠시만 기다려 주세요</div>
      </div>
    </div>

    <!-- 체크리스트 -->
    <div class="checks">
      <div class="row">
        <span class="dot ok" id="dotExt"></span>
        <span class="label">확장 프로그램 실행</span>
        <span class="val" id="valExt">정상</span>
      </div>
      <div class="row">
        <span class="dot off" id="dotSite"></span>
        <span class="label">닥터보이스 웹사이트 연결</span>
        <span class="val" id="valSite">확인 중</span>
      </div>
      <div class="row">
        <span class="dot off" id="dotVer"></span>
        <span class="label">최신 버전</span>
        <span class="val" id="valVer">확인 중</span>
      </div>
    </div>

    <!-- 네이버 자동로그인 계정 -->
    <div class="checks" style="padding:12px 14px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:2px;">네이버 자동로그인</div>
      <div style="font-size:11px;color:#64748b;line-height:1.5;margin-bottom:8px;">
        계정은 이 브라우저에만 <b>암호화 저장</b>되며 서버로 전송되지 않습니다.
        보안문자(캡차)가 뜨면 직접 완료해야 합니다.
      </div>
      <input id="credId" type="text" placeholder="네이버 아이디" autocomplete="off"
        style="width:100%;padding:9px 11px;margin-bottom:6px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;" />
      <input id="credPw" type="password" placeholder="비밀번호" autocomplete="off"
        style="width:100%;padding:9px 11px;margin-bottom:8px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;" />
      <button class="btn btn-primary" id="btnSaveCred" style="margin-bottom:6px;">계정 저장</button>
      <button class="btn btn-ghost" id="btnClearCred" style="margin-bottom:0;">저장된 계정 삭제</button>
      <div class="hint" id="credStatus" style="margin-top:8px;">저장된 계정: 확인 중…</div>
    </div>

    <!-- 업데이트 카드 -->
    <div class="update" id="updateCard">
      <div class="u-title">🎉 새 버전이 있습니다</div>
      <div class="u-notes" id="updateNotes"></div>
      <a class="btn btn-amber" id="btnUpdate" href="#" target="_blank" rel="noopener">
        ⬆️ 새 버전 다운로드
      </a>
      <div class="hint">다운로드 → 압축 해제 → chrome://extensions 에서 폴더 교체</div>
    </div>

    <!-- 웹사이트 열기 -->
    <button class="btn btn-primary" id="btnOpenSite">닥터보이스 프로 열기</button>
    <button class="btn btn-ghost" id="btnRefresh">상태 새로고침</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
